<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Xポスト生成AI｜ひなた</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { background: #0f1117; color: #e8eaf0; font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif; }
    .card { background: #1a1d27; border: 1px solid #2a2d3e; }
    .card-hover:active { background: #22263a; transform: scale(0.98); }
    .btn-primary { background: linear-gradient(135deg, #4f8ef7, #7c5fe6); }
    .btn-primary:active { opacity: 0.85; transform: scale(0.98); }
    .type-btn.selected { border-color: #4f8ef7; background: #1e2d4a; }
    .type-btn { transition: all 0.15s ease; border: 1.5px solid #2a2d3e; }
    .type-btn:active { transform: scale(0.97); }
    textarea { background: #12151f; border: 1.5px solid #2a2d3e; color: #e8eaf0; resize: none; }
    textarea:focus { outline: none; border-color: #4f8ef7; }
    .result-box { background: #12151f; border: 1.5px solid #2a2d3e; }
    .char-count { font-size: 0.75rem; }
    .char-count.over { color: #f87171; }
    .char-count.ok { color: #6b7280; }
    .char-count.near { color: #fbbf24; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease; }
    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #4f8ef7; color: white; padding: 0.6rem 1.5rem; border-radius: 9999px; font-size: 0.875rem; z-index: 100; animation: fadeIn 0.2s ease; }
    .settings-panel { background: #12151f; border: 1.5px solid #2a2d3e; }
    input[type="password"], input[type="text"] { background: #0f1117; border: 1.5px solid #2a2d3e; color: #e8eaf0; }
    input:focus { outline: none; border-color: #4f8ef7; }
    .tag { background: #1e2d4a; color: #7eb3ff; font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 9999px; }
  </style>
</head>
<body class="min-h-screen pb-20">

  <!-- ヘッダー -->
  <header class="sticky top-0 z-50 px-4 py-3 flex items-center justify-between" style="background:#0f1117; border-bottom:1px solid #2a2d3e;">
    <div class="flex items-center gap-2">
      <div class="w-7 h-7 rounded-lg btn-primary flex items-center justify-center text-white text-xs font-bold">X</div>
      <span class="font-bold text-sm">ポスト生成AI</span>
    </div>
    <button id="settingsBtn" class="text-gray-400 hover:text-white transition-colors p-1 rounded-lg">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <!-- 設定パネル（折りたたみ） -->
  <div id="settingsPanel" class="hidden px-4 pt-3 pb-1">
    <div class="settings-panel rounded-xl p-4">
      <p class="text-xs text-gray-400 mb-2 font-medium">🔑 Anthropic APIキー</p>
      <div class="flex gap-2">
        <input id="apiKeyInput" type="password" placeholder="sk-ant-..." class="flex-1 rounded-lg px-3 py-2 text-sm">
        <button id="saveApiKey" class="btn-primary text-white text-sm font-medium px-4 py-2 rounded-lg">保存</button>
      </div>
      <p class="text-xs text-gray-500 mt-2">APIキーはこのデバイスにのみ保存されます</p>
      <div id="apiKeyStatus" class="mt-2 text-xs hidden"></div>
    </div>
  </div>

  <!-- APIキー未設定の警告 -->
  <div id="noApiKeyBanner" class="hidden mx-4 mt-3 px-4 py-3 rounded-xl" style="background:#2a1a0e; border:1px solid #92400e;">
    <p class="text-xs text-yellow-400 font-medium">⚠️ APIキーが未設定です</p>
    <p class="text-xs text-gray-400 mt-1">右上の⚙️からAPIキーを設定してください</p>
  </div>

  <main class="px-4 pt-4 space-y-5 max-w-lg mx-auto">

    <!-- STEP 1: 投稿タイプ選択 -->
    <section>
      <p class="text-xs text-gray-400 font-medium mb-2 uppercase tracking-wider">STEP 1　投稿タイプを選ぶ</p>
      <div class="grid grid-cols-2 gap-2" id="typeGrid">

        <button class="type-btn card-hover rounded-xl p-3 text-left" data-type="ai_log">
          <div class="text-lg mb-1">🤖</div>
          <div class="text-xs font-bold mb-0.5">AI副業ログ</div>
          <div class="text-xs text-gray-500">やったこと・結果・気づき</div>
        </button>

        <button class="type-btn card-hover rounded-xl p-3 text-left" data-type="invest">
          <div class="text-lg mb-1">📈</div>
          <div class="text-xs font-bold mb-0.5">投資・NISA情報</div>
          <div class="text-xs text-gray-500">知らないと損シリーズ</div>
        </button>

        <button class="type-btn card-hover rounded-xl p-3 text-left" data-type="poikatsu">
          <div class="text-lg mb-1">💰</div>
          <div class="text-xs font-bold mb-0.5">ポイ活・節約</div>
          <div class="text-xs text-gray-500">改悪・改善・お得情報</div>
        </button>

        <button class="type-btn card-hover rounded-xl p-3 text-left" data-type="arukoto">
          <div class="text-lg mb-1">😅</div>
          <div class="text-xs font-bold mb-0.5">中間管理職あるある</div>
          <div class="text-xs text-gray-500">共感・日常ネタ</div>
        </button>

        <button class="type-btn card-hover rounded-xl p-3 text-left" data-type="monthly">
          <div class="text-lg mb-1">📊</div>
          <div class="text-xs font-bold mb-0.5">月次報告</div>
          <div class="text-xs text-gray-500">資産・副業の数字報告</div>
        </button>

        <button class="type-btn card-hover rounded-xl p-3 text-left" data-type="quote">
          <div class="text-lg mb-1">🔗</div>
          <div class="text-xs font-bold mb-0.5">引用コメント</div>
          <div class="text-xs text-gray-500">時事ネタ・ニュース</div>
        </button>

      </div>
    </section>

    <!-- STEP 2: ネタ入力 -->
    <section id="netaSection">
      <div class="flex items-center justify-between mb-2">
        <p class="text-xs text-gray-400 font-medium uppercase tracking-wider">STEP 2　ネタを入力</p>
        <span id="selectedTypeTag" class="tag hidden"></span>
      </div>
      <div class="card rounded-xl p-3">
        <p id="netaHint" class="text-xs text-gray-500 mb-2">← 投稿タイプを選ぶと入力ヒントが表示されます</p>
        <textarea
          id="netaInput"
          rows="4"
          placeholder="ネタを入力..."
          class="w-full rounded-lg px-3 py-2 text-sm"
        ></textarea>
        <div class="flex justify-end mt-1">
          <span id="netaCharCount" class="char-count ok">0 字</span>
        </div>
      </div>
    </section>

    <!-- 生成ボタン -->
    <button id="generateBtn" class="btn-primary w-full text-white font-bold py-3.5 rounded-xl text-sm tracking-wide flex items-center justify-center gap-2 transition-all">
      <svg id="genIcon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
      <span id="genLabel">ポストを生成する</span>
    </button>

    <!-- STEP 3: 生成結果 -->
    <section id="resultSection" class="hidden fade-in">
      <p class="text-xs text-gray-400 font-medium mb-2 uppercase tracking-wider">STEP 3　生成結果</p>

      <div class="space-y-3" id="resultCards"></div>

      <!-- 再生成ボタン -->
      <button id="regenBtn" class="mt-3 w-full py-3 rounded-xl text-sm text-gray-300 font-medium card border border-dashed border-gray-600 flex items-center justify-center gap-2">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
        別パターンを再生成
      </button>
    </section>

    <!-- エラー表示 -->
    <div id="errorMsg" class="hidden px-4 py-3 rounded-xl text-sm text-red-300" style="background:#2a0e0e; border:1px solid #7f1d1d;"></div>

  </main>

  <!-- トースト通知 -->
  <div id="toast" class="toast hidden"></div>

<script>
// ===== 定数 =====
const FIXED_CONFIG = {
  theme: 'AI×副業×投資を実践中の30代中間管理職',
  tone: '親しみやすく、リアルな体験ベース',
  maxChars: 140
};

const TYPE_CONFIG = {
  ai_log: {
    label: '🤖 AI副業ログ',
    hint: '例）「ChatGPTで議事録作成→上司に褒められた」「Claudeで副業の提案書を作った」など',
    template: `【AI副業ログ】形式で投稿文を作成してください。
構成：「やったこと（1行）→ 結果（できれば数字）→ 気づき（1行）」`,
  },
  invest: {
    label: '📈 投資・NISA情報',
    hint: '例）「NISA積立額を増やした」「個別株で○○した」「最近気になるニュース」など',
    template: `【知らないと損】系の投資・NISA情報として投稿文を作成してください。
構成：「✅ポイントを2〜3つ箇条書き → 自分の実践コメント1行」`,
  },
  poikatsu: {
    label: '💰 ポイ活・節約',
    hint: '例）「ドコモポイ活が改悪」「楽天の改定があった」「○○がお得」など',
    template: `ポイ活・節約情報として投稿文を作成してください。
構成：「変更内容 → 影響 → 対策または感想」`,
  },
  arukoto: {
    label: '😅 中間管理職あるある',
    hint: '例）「部下と上司の板挟みで○○した」「会議で○○だった」など日常のエピソード',
    template: `中間管理職のあるある・共感ネタとして投稿文を作成してください。
構成：共感を呼ぶ短いエピソード → 「…わかる人いる？😅」などの問いかけ`,
  },
  monthly: {
    label: '📊 月次報告',
    hint: '例）「NISAが○○万、副業収入○万、今月の気づき」など数字を入れてください',
    template: `月次の資産・副業報告として投稿文を作成してください。
構成：「📈NISA評価額・💼副業収入・💡今月の気づき → 来月の目標」`,
  },
  quote: {
    label: '🔗 引用コメント',
    hint: '例）「○○というニュースを見た（記事の概要）」を入力してください',
    template: `ニュース・時事ネタへの引用コメントとして投稿文を作成してください。
構成：「ニュースへの反応 → 副業・投資・AI視点での自分の解釈や気づき」`,
  },
};

// ===== 状態管理 =====
let selectedType = null;
let isGenerating = false;

// ===== APIキー管理 =====
function getApiKey() { return localStorage.getItem('hinata_api_key') || ''; }
function saveApiKey(key) { localStorage.setItem('hinata_api_key', key); }

function checkApiKey() {
  const key = getApiKey();
  document.getElementById('noApiKeyBanner').classList.toggle('hidden', !!key);
  if (key) {
    document.getElementById('apiKeyInput').value = key;
  }
}

// ===== 設定パネル =====
document.getElementById('settingsBtn').addEventListener('click', () => {
  document.getElementById('settingsPanel').classList.toggle('hidden');
});

document.getElementById('saveApiKey').addEventListener('click', () => {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key.startsWith('sk-ant-')) {
    showApiKeyStatus('❌ APIキーの形式が正しくありません（sk-ant- から始まる必要があります）', 'text-red-400');
    return;
  }
  saveApiKey(key);
  showApiKeyStatus('✅ 保存しました', 'text-green-400');
  setTimeout(() => document.getElementById('settingsPanel').classList.add('hidden'), 1000);
  checkApiKey();
});

function showApiKeyStatus(msg, cls) {
  const el = document.getElementById('apiKeyStatus');
  el.textContent = msg;
  el.className = `mt-2 text-xs ${cls}`;
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 3000);
}

// ===== タイプ選択 =====
document.querySelectorAll('.type-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedType = btn.dataset.type;

    const cfg = TYPE_CONFIG[selectedType];
    document.getElementById('netaHint').textContent = cfg.hint;
    document.getElementById('netaInput').placeholder = cfg.hint.replace('例）', '').split('「')[0] + '...';

    const tag = document.getElementById('selectedTypeTag');
    tag.textContent = cfg.label;
    tag.classList.remove('hidden');

    // 結果リセット
    document.getElementById('resultSection').classList.add('hidden');
    document.getElementById('errorMsg').classList.add('hidden');
    document.getElementById('netaInput').focus();
  });
});

// ===== ネタ文字数カウント =====
document.getElementById('netaInput').addEventListener('input', function() {
  const len = this.value.length;
  const el = document.getElementById('netaCharCount');
  el.textContent = `${len} 字`;
  el.className = `char-count ${len > 200 ? 'over' : len > 100 ? 'near' : 'ok'}`;
});

// ===== ポスト生成 =====
document.getElementById('generateBtn').addEventListener('click', generatePost);
document.getElementById('regenBtn').addEventListener('click', generatePost);

async function generatePost() {
  const apiKey = getApiKey();
  if (!apiKey) {
    document.getElementById('settingsPanel').classList.remove('hidden');
    showToast('⚠️ まずAPIキーを設定してください');
    return;
  }
  if (!selectedType) {
    showToast('投稿タイプを選んでください');
    return;
  }
  const neta = document.getElementById('netaInput').value.trim();
  if (!neta) {
    showToast('ネタを入力してください');
    document.getElementById('netaInput').focus();
    return;
  }

  setLoading(true);
  document.getElementById('errorMsg').classList.add('hidden');

  const cfg = TYPE_CONFIG[selectedType];
  const prompt = buildPrompt(cfg, neta);

  try {
    const result = await callClaudeAPI(apiKey, prompt);
    displayResults(result);
  } catch (e) {
    showError(e.message);
  } finally {
    setLoading(false);
  }
}

function buildPrompt(cfg, neta) {
  return `あなたは以下のペルソナになりきって、Xの投稿文を書いてください。

【ペルソナ】
・30代前半の男性会社員。通信セクター勤務の中間管理職
・部下と上司の板挟みで日々消耗しながらも、AIや投資・副業で「会社依存」から脱出しようと試みている
・文体は口語体。「〜だ」「〜だな」「〜した」「〜だと思う」など自然な男性口語
・飾らず、等身大。完璧な人間ではなく、失敗や迷いも正直に書く
・テンションは落ち着いている。過度な感嘆符や煽り文句は使わない
・絵文字は1〜2個まで。なくてもよい

【文体の禁止事項（AI感が出るため絶対使用禁止）】
・「〜していきましょう」「〜していきたいと思います」
・「〜することが大切です」「〜を心がけましょう」
・「ぜひ参考にしてください」「一緒に頑張りましょう」
・「〜なのではないでしょうか」（過剰な丁寧表現）
・✅ を箇条書きの頭に使う（多用禁止）
・自己啓発・意識高い系の言い回し全般

【絶対遵守ルール】
1. ハッシュタグ（#記号を含む語）はどのパターンにも一切付けないこと。
2. 説明文・ラベル・前置き・後書きは不要。投稿文の本文のみ出力すること。
3. 出力は必ず下記【出力形式】に従うこと。
4. 副業・投資・AIに無理やり結びつけないこと。ネタの内容に自然に沿った文章を書くこと。ネタと関係ない話題を付け加えない。

【投稿タイプ・作成指示】
${cfg.template}

【ネタ情報】
${neta}

【フック文言のルール】
全パターンの1行目は必ず読者が「続きを読みたい」と思うフック文言にすること。
フックの型（どれか1つを使う）：
・意外性型：「○○だと思ってたけど、全然違った」「これ、誰も教えてくれなかった」
・共感型：「○○、あるよな」「これわかる人いると思う」
・数字・事実型：「○○が月△△円変わった」「3ヶ月やって気づいたこと」
・問いかけ型：「○○って本当に意味あるのか？」「なんで○○しないんだろう」
パターンごとに異なるフックの型を使うこと。

【出力形式】
必ず以下の区切り記号（---A--- / ---B--- / ---C---）をそのまま使い、各パターンの投稿文を出力すること。

---A---
ここにパターンAの投稿文（必ず${FIXED_CONFIG.maxChars}字以内・ペルソナの口語体で・1行目はフック）
---B---
ここにパターンBの投稿文（必ず${FIXED_CONFIG.maxChars}字以内・パターンAと異なる切り口で・1行目はフック）
---C---
ここにパターンCの投稿文（文字数制限なし・300〜500字目安・ペルソナの視点から深く掘り下げた考察・インサイト重視・1行目はフック）`;
}

async function callClaudeAPI(apiKey, prompt) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 2048,
      messages: [{ role: 'user', content: prompt }],
    }),
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    if (res.status === 401) throw new Error('APIキーが無効です。設定を確認してください。');
    if (res.status === 429) throw new Error('リクエスト制限に達しました。しばらく待ってから再試行してください。');
    throw new Error(err.error?.message || `APIエラー (${res.status})`);
  }

  const data = await res.json();
  return data.content[0].text;
}

function displayResults(text) {
  // ---A--- / ---B--- / ---C--- で分割し、各パターンの本文を取り出す
  const raw = text.split(/---[ABC]---/).map(p => p.trim()).filter(p => p.length > 0);
  const container = document.getElementById('resultCards');
  container.innerHTML = '';

  raw.forEach((pattern, i) => {
    // 念のため残存するラベル行を除去
    const body = pattern.replace(/^パターン[A-C]（[^）]*）\n?/u, '').replace(/^パターン[A-C]\n?/u, '').trim();
    const charCount = body.length;
    const isInsight = i === 2; // パターンC＝インサイト型（文字数制限なし）
    const isOver = !isInsight && charCount > FIXED_CONFIG.maxChars;
    const label = ['A', 'B', 'C'][i] || String(i + 1);

    const card = document.createElement('div');
    card.className = 'result-box rounded-xl p-4 fade-in';

    if (isInsight) {
      // パターンC専用スタイル（紫系・インサイト型）
      card.style.borderColor = '#4a3f6b';
      card.innerHTML = `
        <div class="flex items-center justify-between mb-2">
          <div class="flex items-center gap-1.5">
            <span class="tag" style="background:#2d1f4a;color:#b39dff;">パターン ${label}</span>
            <span style="font-size:0.65rem;color:#9c7fe8;background:#1e1530;padding:0.15rem 0.5rem;border-radius:9999px;">💡 インサイト型</span>
          </div>
          <span class="char-count ok">${charCount} 字</span>
        </div>
        <p class="text-sm leading-relaxed whitespace-pre-wrap mb-3 select-all" style="color:#dde3f0;line-height:1.8;">${escapeHtml(body)}</p>
        <button class="copy-btn w-full py-2.5 rounded-lg text-xs font-medium text-white flex items-center justify-center gap-1.5 transition-all"
          style="background:#2d1f4a;border:1px solid #6d4fc9;"
          data-text="${escapeAttr(body)}">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          <span>コピーする</span>
        </button>
      `;
    } else {
      card.innerHTML = `
        <div class="flex items-center justify-between mb-2">
          <span class="tag">パターン ${label}</span>
          <span class="char-count ${isOver ? 'over' : charCount > 120 ? 'near' : 'ok'}">${charCount} / ${FIXED_CONFIG.maxChars}字</span>
        </div>
        <p class="text-sm leading-relaxed whitespace-pre-wrap mb-3 select-all" style="color:#dde3f0;">${escapeHtml(body)}</p>
        <button class="copy-btn w-full py-2.5 rounded-lg text-xs font-medium text-white flex items-center justify-center gap-1.5 transition-all"
          style="background:${isOver ? '#7f1d1d' : '#1e3a5f'}; border:1px solid ${isOver ? '#991b1b' : '#2563eb'};"
          data-text="${escapeAttr(body)}">
          ${isOver
            ? '<span>⚠️ 140字超過（要編集）</span>'
            : `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
             <span>コピーする</span>`
          }
        </button>
      `;
    }
    container.appendChild(card);
  });

  // コピーボタンのイベント
  container.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const txt = btn.dataset.text;
      navigator.clipboard.writeText(txt).then(() => {
        showToast('✅ コピーしました！');
        btn.innerHTML = `<span>✅ コピー完了！</span>`;
        setTimeout(() => {
          btn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><span>コピーする</span>`;
        }, 2000);
      });
    });
  });

  document.getElementById('resultSection').classList.remove('hidden');
  document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ===== UI ユーティリティ =====
function setLoading(flag) {
  isGenerating = flag;
  const btn = document.getElementById('generateBtn');
  const icon = document.getElementById('genIcon');
  const label = document.getElementById('genLabel');

  if (flag) {
    btn.disabled = true;
    btn.style.opacity = '0.7';
    icon.outerHTML = `<svg id="genIcon" class="spinner" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>`;
    label.textContent = '生成中...';
  } else {
    btn.disabled = false;
    btn.style.opacity = '1';
    const iconEl = document.getElementById('genIcon');
    if (iconEl) iconEl.outerHTML = `<svg id="genIcon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>`;
    label.textContent = 'ポストを生成する';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = `❌ ${msg}`;
  el.classList.remove('hidden');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 2500);
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escapeAttr(str) {
  return str.replace(/"/g,'&quot;').replace(/\n/g,'&#10;');
}

// ===== 初期化 =====
checkApiKey();
</script>
</body>
</html>
